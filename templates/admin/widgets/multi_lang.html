<style>
.dark .multi-lang-widget-container input,
.dark .multi-lang-widget-container textarea,
.dark .multi-lang-widget-container select {
    background-color: rgb(24 24 27) !important;  /* zinc-900 */
    border-color: rgb(63 63 70) !important;       /* zinc-700 */
    color: rgb(244 244 245) !important;           /* zinc-100 */
}
.multi-lang-widget-container .lang-tab-btn {
    padding: 4px 14px;
    border-radius: 9999px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    cursor: pointer;
    border: 1px solid transparent;
    background: transparent;
    color: #71717a;
}
.multi-lang-widget-container .lang-tab-btn.active {
    background: #ede9fe;
    color: #6d28d9;
    border-color: #c4b5fd;
}
.dark .multi-lang-widget-container .lang-tab-btn.active {
    background: rgba(124, 58, 237, 0.2);
    color: #c4b5fd;
    border-color: #6d28d9;
}
.multi-lang-widget-container .lang-pane-wrap {
    position: relative;
}
.multi-lang-widget-container .lang-pane.lang-inactive {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    visibility: hidden;
    pointer-events: none;
}
</style>

<div class="multi-lang-widget-container space-y-2 p-4 border border-gray-200 dark:border-zinc-800 rounded-xl bg-gray-50/50 dark:bg-zinc-900/50">
    <div class="lang-tabs flex items-center gap-2">
        <button type="button" class="lang-tab-btn active" data-lang-target="vi">Tiếng Việt (VI)</button>
        <button type="button" class="lang-tab-btn" data-lang-target="en">Tiếng Anh (EN)</button>
    </div>
    <div class="lang-pane-wrap">
        <div class="lang-pane" data-lang="vi">
            {% include widget.subwidgets.0.template_name with widget=widget.subwidgets.0 %}
        </div>
        <div class="lang-pane lang-inactive" data-lang="en">
            {% include widget.subwidgets.1.template_name with widget=widget.subwidgets.1 %}
        </div>
    </div>
</div>

<script>
if (!window._multiLangTabsReady) {
    window._multiLangTabsReady = true;
    document.addEventListener('click', function (e) {
        var btn = e.target.closest('.lang-tab-btn');
        if (!btn) return;
        var container = btn.closest('.multi-lang-widget-container');
        if (!container) return;

        container.querySelectorAll('.lang-tab-btn').forEach(function (b) { b.classList.remove('active'); });
        btn.classList.add('active');

        var target = btn.getAttribute('data-lang-target');
        container.querySelectorAll('.lang-pane').forEach(function (pane) {
            pane.classList.toggle('lang-inactive', pane.getAttribute('data-lang') !== target);
        });

        // Báo cho TinyMCE (nếu có) tính lại kích thước sau khi đổi tab, tránh hiển thị méo/lệch
        window.dispatchEvent(new Event('resize'));
    });
}
</script>
