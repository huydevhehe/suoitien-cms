<!DOCTYPE html>
<html lang="vi" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập | HALINK CMS</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #0d2b45 0%, #060e17 60%);
        }
    </style>
</head>
<body class="text-slate-100 min-h-screen flex items-center justify-center p-4">

    <!-- Login Container -->
    <div class="w-full max-w-md bg-slate-900/60 backdrop-blur-xl border border-slate-800 rounded-2xl p-8 shadow-2xl shadow-emerald-950/10">
        
        <!-- Header -->
        <div class="text-center mb-8">
            <div class="inline-flex w-16 h-16 rounded-2xl bg-emerald-500/10 border border-emerald-500/20 items-center justify-center text-emerald-400 text-3xl mb-4 shadow-lg shadow-emerald-500/5">
                <i class="fa-solid fa-circle-nodes"></i>
            </div>
            <h1 class="text-2xl font-bold tracking-tight text-white">Chào mừng quay lại</h1>
            <p class="text-sm text-slate-400 mt-1">Đăng nhập vào Hệ thống Quản trị HALINK CMS</p>
        </div>

        <!-- Notification messages -->
        {% if messages %}
        <div class="mb-6 space-y-2">
            {% for message in messages %}
            <div class="p-3.5 rounded-xl border border-red-500/20 bg-red-500/10 text-red-400 flex items-center space-x-2 text-sm">
                <i class="fa-solid fa-circle-exclamation text-base"></i>
                <span>{{ message }}</span>
            </div>
            {% endfor %}
        </div>
        {% endif %}

        <!-- Form -->
        <form method="POST" class="space-y-5">
            {% csrf_token %}
            
            <!-- Username Input -->
            <div>
                <label for="username" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Tên đăng nhập / Email</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-slate-500">
                        <i class="fa-solid fa-user"></i>
                    </div>
                    <input type="text" name="username" id="username" required
                        class="w-full bg-slate-950 border border-slate-800 focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 rounded-xl pl-10 pr-4 py-3 text-sm text-white placeholder-slate-600 focus:outline-none transition-all duration-200"
                        placeholder="Nhập tài khoản admin...">
                </div>
            </div>

            <!-- Password Input -->
            <div>
                <div class="flex justify-between items-center mb-2">
                    <label for="password" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider">Mật khẩu</label>
                </div>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-slate-500">
                        <i class="fa-solid fa-lock"></i>
                    </div>
                    <input type="password" name="password" id="password" required
                        class="w-full bg-slate-950 border border-slate-800 focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 rounded-xl pl-10 pr-4 py-3 text-sm text-white placeholder-slate-600 focus:outline-none transition-all duration-200"
                        placeholder="••••••••">
                </div>
            </div>

            <!-- Submit Button -->
            <button type="submit" 
                class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-semibold rounded-xl py-3 text-sm transition-all duration-200 hover:shadow-lg hover:shadow-emerald-500/20 active:scale-[0.99] flex items-center justify-center space-x-2">
                <span>Đăng nhập</span>
                <i class="fa-solid fa-arrow-right text-xs"></i>
            </button>
        </form>

        <!-- Footer -->
        <div class="mt-8 text-center border-t border-slate-800/60 pt-6">
            <p class="text-xs text-slate-500">
                &copy; 2026 Suối Tiên Theme. Thiết kế bởi Google Deepmind.
            </p>
        </div>

    </div>

</body>
</html>
